<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 CNY Battle Arcade 🔥</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>🔥 CNY BATTLE 🔥</h1>
                <p style="color: #fff; margin-bottom: 20px;">Defeat the Dragon with Math!</p>
                <div class="input-area">
                    <input type="text" id="pin-input" placeholder="Enter Mission Code">
                    <button id="start-btn" class="btn">START BATTLE</button>
                </div>
                <div id="error-msg" class="error hidden"></div>
            </div>
        </div>

        <!-- BATTLE SCREEN -->
        <div id="battle-screen" class="screen hidden">
            <!-- HUD -->
            <div class="hud">
                <div class="player-hud">
                    <div class="name">🧙 WIZARD</div>
                    <div class="hp-bar-container">
                        <div id="player-hp-fill"></div>
                    </div>
                    <div class="score-box">SCORE: <span id="score-display">0</span></div>
                </div>
                <div class="vs-logo">VS</div>
                <div class="enemy-hud">
                    <div class="name">🐉 DRAGON</div>
                    <div class="hp-bar-container">
                        <div id="enemy-hp-fill"></div>
                    </div>
                    <div class="score-box">COMBO: <span id="combo-display" class="hidden"></span></div>
                </div>
            </div>

            <!-- ARENA -->
            <div class="arena">
                <div class="fighter player">
                    <div class="avatar" id="player-sprite">🧙</div>
                    <div class="shadow"></div>
                </div>
                <div class="fighter enemy">
                    <div class="avatar" id="enemy-sprite">🐉</div>
                    <div class="shadow"></div>
                    <div class="aura"></div>
                </div>
                <div id="fireball" class="projectile hidden">🔥</div>
                <div id="enemy-projectile" class="projectile hidden">⚫</div>
                <div id="explosion" class="explosion hidden">💥</div>
                <div id="crit-display" class="crit-text hidden">CRITICAL HIT!</div>
                <div id="miss-display" class="combo-text miss hidden">MISSED!</div>
            </div>

            <!-- CONTROL PANEL -->
            <div class="control-panel">
                <div class="timer-strip">
                    <div id="timer-fill"></div>
                </div>
                <div class="question-box">
                    <div class="q-header" id="q-progress">QUESTION 1 / 12</div>
                    <p id="q-text">Loading...</p>
                    <div id="options-container" class="options-grid"></div>
                </div>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="screen hidden">
            <div class="victory-box">
                <h1 id="end-title">VICTORY!</h1>
                <p id="end-reason" style="font-size: 1.5rem; margin: 20px 0;"></p>
                <div class="stats-grid">
                    <div>FINAL SCORE</div>
                    <div class="big-num" id="final-score">0</div>
                    <div>MAX COMBO</div>
                    <div class="big-num" id="final-combo">0</div>
                </div>
                <!-- FIXED: Added proper ID for PLAY AGAIN button -->
                <button id="play-again-btn" class="btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
